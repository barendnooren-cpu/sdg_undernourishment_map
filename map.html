<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SDG 2 - Prevalence of Undernourishment</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        html, body { height: 100%; margin: 0; }
        #map { width: 100%; height: 500px; }
        .info { padding: 6px 8px; font: 14px/16px Arial, Helvetica, sans-serif; background: white; background: rgba(255,255,255,0.8); box-shadow: 0 0 15px rgba(0,0,0,0.2); border-radius: 5px; }
        .info h4 { margin: 0 0 5px; color: #777; }
        .legend { text-align: left; line-height: 18px; color: #555; }
        .legend i { width: 18px; height: 18px; float: left; margin-right: 8px; opacity: 0.7; }
    </style>
</head>
<body>

<h2>
    <b>SDG Goal 2:</b> End Hunger, Achieve Food Security and Improved Nutrition and Promote Sustainable Agriculture<br><br>
    <b>SDG Indicator 2.1.1:</b> Prevalence of Undernourishment (%) — 2020
</h2>

<div id="map"></div>

<script type="text/javascript" src="undernourish_map.js"></script>
<script type="text/javascript">

    const map = L.map('map').setView([10, 10], 2);

    const tiles = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
    }).addTo(map);

    const info = L.control();

    info.onAdd = function (map) {
        this._div = L.DomUtil.create('div', 'info');
        this.update();
        return this._div;
    };

    info.update = function (props) {
        const contents = props ? `<b>${props.nam_en}</b><br />${props.SDG_Field !== null ? props.SDG_Field + '% undernourished' : 'No data'}` : 'Hover over a country';
        this._div.innerHTML = `<h4>Prevalence of Undernourishment (%)</h4>${contents}`;
    };

    info.addTo(map);

    function getColor(d) {
        return d === null || d === undefined ? '#d3d3d3' :
            d > 40 ? '#005a32' :
            d > 30 ? '#238b45' :
            d > 20 ? '#41ab5d' :
            d > 10 ? '#74c476' :
            d > 0  ? '#c7e9c0' : '#d3d3d3';
    }

    function style(feature) {
        return {
            weight: 1,
            opacity: 1,
            color: '#999',
            dashArray: '3',
            fillOpacity: 0.7,
            fillColor: getColor(feature.properties.SDG_Field)
        };
    }

    function highlightFeature(e) {
        const layer = e.target;
        layer.setStyle({
            weight: 3,
            color: '#333',
            dashArray: '',
            fillOpacity: 0.7
        });
        layer.bringToFront();
        info.update(layer.feature.properties);
    }

    const geojson = L.geoJson(nationData, {
        style,
        onEachFeature
    }).addTo(map);

    function resetHighlight(e) {
        geojson.resetStyle(e.target);
        info.update();
    }

    function zoomToFeature(e) {
        map.fitBounds(e.target.getBounds());
    }

    function onEachFeature(feature, layer) {
        layer.on({
            mouseover: highlightFeature,
            mouseout: resetHighlight,
            click: zoomToFeature
        });
    }

    map.attributionControl.addAttribution('SDG data &copy; <a href="https://unstats-undesa.opendata.arcgis.com/">UN SDG DataHub</a>');

    const legend = L.control({position: 'bottomright'});

    legend.onAdd = function (map) {
        const div = L.DomUtil.create('div', 'info legend');
        const grades = [0, 10, 20, 30, 40];
        const labels = [];
        let from, to;

        for (let i = 0; i < grades.length; i++) {
            from = grades[i];
            to = grades[i + 1];
            labels.push(`<i style="background:${getColor(from + 1)}"></i> ${from}${to ? '&ndash;' + to : '+'}`);
        }

        labels.push(`<i style="background:#d3d3d3"></i> No Data`);
        div.innerHTML = labels.join('<br>');
        return div;
    };

    legend.addTo(map);

</script>
</body>
</html>
